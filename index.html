<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d2b08">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Samurice Dino Games — Phonics runner where you slash dinosaurs with the power of words!">
    <title>⚔️ Samurice Dino Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap">
    <link rel="stylesheet" href="css/style.css">
    <!-- Phase 9: PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- ctx.roundRect polyfill for older browsers -->
    <script>
    (function() {
      const proto = CanvasRenderingContext2D.prototype;
      if (!proto.roundRect) {
        proto.roundRect = function(x, y, w, h, r) {
          if (typeof r === 'number') r = [r, r, r, r];
          const [tl=0, tr=0, br=0, bl=0] = Array.isArray(r) ? r : [r];
          this.beginPath();
          this.moveTo(x + tl, y);
          this.lineTo(x + w - tr, y);
          this.arcTo(x + w, y, x + w, y + tr, tr);
          this.lineTo(x + w, y + h - br);
          this.arcTo(x + w, y + h, x + w - br, y + h, br);
          this.lineTo(x + bl, y + h);
          this.arcTo(x, y + h, x, y + h - bl, bl);
          this.lineTo(x, y + tl);
          this.arcTo(x, y, x + tl, y, tl);
          this.closePath();
        };
      }
    })();
    </script>
</head>
<body>
<!-- ══════════════════════════════════════════════════════════
     MODE CHOOSER (external entry point — choose game type)
═══════════════════════════════════════════════════════════════ -->
<div id="modeChooser" class="screen active">
    <div class="mc-hero">
        <img src="assets/sprites/riku-idle.png" class="mc-mascot" alt="Riku the Samurice" onerror="this.style.display='none'">
        <h1 class="mc-title">⚔️ Samurice Dino Games 🦖</h1>
        <p class="mc-sub">Learn to read! Slash dinos with WORD POWER!</p>
    </div>
    <div class="mc-buttons">
        <button class="mc-btn slash-btn" id="launchSlashBtn">
            <span class="mc-icon">⚔️</span>
            <div class="mc-text">
                <span class="mc-name">Dino Slash Adventure!</span>
                <span class="mc-desc">Run, jump, spell words & fight dino bosses!</span>
            </div>
        </button>
        <button class="mc-btn flap-btn" id="launchFlappyBtn">
            <span class="mc-icon">🦕</span>
            <div class="mc-text">
                <span class="mc-name">Dino Dash!</span>
                <span class="mc-desc">Fly through the sky! How far can you go?</span>
            </div>
        </button>
    </div>
</div>
<!-- ══════════════════════════════════════════════════════════
     SAMURICE DINO SLASH — Phonics auto-runner + battle game
     Canvas = all game rendering (title, runner, menus, etc.)
     #battleOverlay = interactive phoneme tiles (HTML, for touch)
═══════════════════════════════════════════════════════════════ -->
<div id="slashScreen" class="screen">
    <div id="slashWrapper">
        <!-- Main game canvas -->
        <canvas id="slashCanvas"></canvas>
        <!-- Rotate-device prompt — portrait only -->
        <div id="rotatePrompt" class="rotate-prompt">
            <div class="rotate-icon">📱➡️🔄</div>
            <div class="rotate-text">Rotate your device for the best experience!</div>
        </div>
        <!-- Exit button -->
        <button id="slashExitBtn"
                class="slash-exit-btn"
                title="Back to menu">✕</button>
        <!-- Fullscreen toggle -->
        <button id="slashFsBtn"
                class="slash-fs-btn game-fs-btn"
                title="Fullscreen">⛶</button>
        <!-- Pause button — visible only during active runner / battle -->
        <button id="slashPauseBtn"
                class="slash-pause-btn hidden"
                title="Pause (P)">⏸</button>
        <!-- Runner D-pad controls (touch only) -->
        <!-- In endless mode, left/right are hidden; only JUMP shown -->
        <div id="runnerControls" class="runner-controls hidden">
            <div class="dpad-move">
                <button class="dpad-btn" id="dpadLeft">◀</button>
                <button class="dpad-btn" id="dpadRight">▶</button>
            </div>
            <button class="dpad-btn dpad-jump" id="dpadJump">▲<br><span>JUMP</span></button>
        </div>
        <!-- Battle overlay: phoneme tiles + word builder.
             Populated by BattleEngine (campaign) or EndlessBattleEngine (endless).
             Class toggled between 'battle-overlay' (campaign) and
             'endless-battle-overlay' (endless mode) by JS. -->
        <div id="battleOverlay" class="battle-overlay"></div>
    </div>
</div>
<!-- ══════════════════════════════════════════════════════════
     DINO DASH — Flappy Bird Screen (unchanged)
═══════════════════════════════════════════════════════════════ -->
<div id="flappyScreen" class="screen">
    <div id="flappyWrapper">
        <canvas id="flappyCanvas"></canvas>
        <button id="muteBtn" class="fd-btn fd-mute flappy-overlay-btn">🔊</button>
        <button id="flappyBackBtn" class="fd-btn fd-back flappy-overlay-btn">✕</button>
        <button id="flappyFsBtn" class="fd-btn fd-fs flappy-overlay-btn game-fs-btn" title="Fullscreen">⛶</button>
        <div id="skinPicker" class="fd-skin-picker">
            <button id="prevSkin" class="fd-skin-arrow flappy-overlay-btn">◀</button>
            <span id="skinName" class="fd-skin-name">Velociraptor</span>
            <button id="nextSkin" class="fd-skin-arrow flappy-overlay-btn">▶</button>
        </div>
        <div id="modeButtons" class="fd-mode-row">
            <button id="modeBtnClassic" class="fd-mode-btn fd-active flappy-overlay-btn">🎲 Classic</button>
            <button id="modeBtnDaily" class="fd-mode-btn flappy-overlay-btn">📅 Daily</button>
        </div>
        <button id="shareBtn" class="fd-share-btn flappy-overlay-btn" style="display:none">
            📤 Share Score
        </button>
    </div>
</div>
<!-- ══════════════════════════════════════════════════════════
     SCRIPTS — load order matters
       1. phonicsData – word data, no dependencies
       2. progressTracker – localStorage (shop, achievements, daily, endless)
       3. audioManager – Web Audio + TTS + chiptune music
       4. runnerEngine – campaign runner + EndlessRunnerEngine (appended)
       5. battleEngine – campaign boss battle + EndlessBattleEngine (appended)
       6. slashGame – main orchestrator; overrides launchSlashGame()
       7. game.js – Dino Dash (untouched)
═══════════════════════════════════════════════════════════════ -->
<script src="js/phonicsData.js"></script>
<script src="js/progressTracker.js"></script>
<script src="js/audioManager.js"></script>
<script src="js/runnerEngine.js"></script>
<script src="js/battleEngine.js"></script>
<script src="js/tutorial.js"></script><!-- PHASE 6: onboarding tutorial -->
<script src="js/slashGame.js"></script>
<script src="js/game.js"></script>
<script>
// ── Button event listeners (replaces inline onclick attributes) ──
document.addEventListener('DOMContentLoaded', function() {
  // Mode chooser
  document.getElementById('launchSlashBtn')?.addEventListener('click', () => launchSlashGame());
  document.getElementById('launchFlappyBtn')?.addEventListener('click', () => launchFlappyGame());
  // Slash game controls
  document.getElementById('slashExitBtn')?.addEventListener('click', () => exitSlash());
  document.getElementById('slashFsBtn')?.addEventListener('click', () => toggleFullscreen('slashWrapper'));
  document.getElementById('slashPauseBtn')?.addEventListener('click', () => _slashPause());
  // Flappy game controls
  document.getElementById('flappyBackBtn')?.addEventListener('click', () => exitFlappy());
  document.getElementById('flappyFsBtn')?.addEventListener('click', () => toggleFullscreen('flappyWrapper'));
});

// ── Fullscreen toggle — targets the active game wrapper ────────
// Falls back to document.documentElement if wrapper not found.
function toggleFullscreen(wrapperId) {
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (!fsEl) {
    const target = (wrapperId && document.getElementById(wrapperId))
                   || document.documentElement;
    const req = target.requestFullscreen || target.webkitRequestFullscreen;
    if (req) req.call(target).catch(() => {});
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document).catch(() => {});
  }
}
function _syncFsIcons() {
  const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.querySelectorAll('.game-fs-btn').forEach(btn => {
    btn.textContent = inFs ? '⊡' : '⛶';
    btn.title = inFs ? 'Exit fullscreen' : 'Fullscreen';
  });
}
document.addEventListener('fullscreenchange', _syncFsIcons);
document.addEventListener('webkitfullscreenchange', _syncFsIcons);
// ── Pause helper called by the pause button ──────────────────
function _slashPause() {
  if (!_slashGameInstance) return;
  const s = _slashGameInstance.state;
  if (s === 'runner'  && _slashGameInstance.runner)  _slashGameInstance.runner._togglePause();
  if (s === 'battle'  && _slashGameInstance.battle)  _slashGameInstance.battle._togglePause();
  if (s === 'endless-runner' && _slashGameInstance.endlessRunner) _slashGameInstance.endlessRunner._togglePause();
}
// ── Prevent context menu & double-tap zoom on game canvases only ──
// Scoped to the game wrappers so normal browser behaviour is
// preserved everywhere else on the page (links, text, PWA banner).
(function attachGameInputGuards() {
  const gameWrapperIds = ['slashWrapper', 'flappyWrapper'];
  gameWrapperIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('contextmenu', e => e.preventDefault());
    let lastTap = 0;
    el.addEventListener('touchend', function(e) {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });
  });
})();
</script>

<!-- Phase 9: PWA install banner (hidden until beforeinstallprompt fires) -->
<div id="pwa-install-banner" aria-live="polite" role="complementary">
  <div class="pwa-text">
    ⚔️ <strong>Play offline!</strong>
    <small>Add Samurice Dino Slash to your home screen</small>
  </div>
  <button id="pwa-install-btn" aria-label="Add to home screen">Install</button>
  <button id="pwa-dismiss-btn" aria-label="Dismiss install prompt">✕</button>
</div>

<!-- Phase 9: Service worker registration + PWA install prompt logic -->
<script>
(function() {
  'use strict';
  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {/* silent */});
    });
  }

  // Intercept the browser's native install prompt so we can show our own banner
  let _deferredPrompt = null;
  const banner  = document.getElementById('pwa-install-banner');
  const installBtn = document.getElementById('pwa-install-btn');
  const dismissBtn = document.getElementById('pwa-dismiss-btn');

  // Don't show banner if user already dismissed it in a previous session
  if (localStorage.getItem('pwa-dismissed') === '1') return;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();          // stop the browser default mini-infobar
    _deferredPrompt = e;
    // Show our banner with a short delay so the game canvas has settled
    setTimeout(() => banner.classList.add('visible'), 3000);
  });

  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!_deferredPrompt) return;
      banner.classList.remove('visible');
      _deferredPrompt.prompt();
      const { outcome } = await _deferredPrompt.userChoice;
      if (outcome === 'accepted') localStorage.setItem('pwa-dismissed', '1');
      _deferredPrompt = null;
    });
  }

  if (dismissBtn) {
    dismissBtn.addEventListener('click', () => {
      banner.classList.remove('visible');
      localStorage.setItem('pwa-dismissed', '1');
      _deferredPrompt = null;
    });
  }

  // Hide banner if the app is already installed (display-mode: standalone)
  if (window.matchMedia('(display-mode: standalone)').matches) {
    localStorage.setItem('pwa-dismissed', '1');
  }
})();
</script>
</body>
</html>
