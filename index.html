<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d2b08">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Samurice Dino Games — Phonics runner where you slash dinosaurs with the power of words!">
    <title>⚔️ Samurice Dino Games</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- ctx.roundRect polyfill for older browsers -->
    <script>
    (function() {
      const proto = CanvasRenderingContext2D.prototype;
      if (!proto.roundRect) {
        proto.roundRect = function(x, y, w, h, r) {
          if (typeof r === 'number') r = [r, r, r, r];
          const [tl=0, tr=0, br=0, bl=0] = Array.isArray(r) ? r : [r];
          this.beginPath();
          this.moveTo(x + tl, y);
          this.lineTo(x + w - tr, y);
          this.arcTo(x + w, y, x + w, y + tr, tr);
          this.lineTo(x + w, y + h - br);
          this.arcTo(x + w, y + h, x + w - br, y + h, br);
          this.lineTo(x + bl, y + h);
          this.arcTo(x, y + h, x, y + h - bl, bl);
          this.lineTo(x, y + tl);
          this.arcTo(x, y, x + tl, y, tl);
          this.closePath();
        };
      }
    })();
    </script>
</head>
<body>

<!-- MODE CHOOSER -->
<div id="modeChooser" class="screen active">
    <div class="mc-hero">
        <img src="assets/sprites/riku-idle.png" class="mc-mascot" alt="Riku the Samurice" onerror="this.style.display='none'">
        <h1 class="mc-title">⚔️ Samurice Dino Games</h1>
        <p class="mc-sub">Slash dinosaurs with the power of PHONICS!</p>
    </div>
    <div class="mc-buttons">
        <button class="mc-btn slash-btn" onclick="launchSlashGame()">
            <span class="mc-icon">⚔️</span>
            <div class="mc-text">
                <span class="mc-name">Samurice Dino Slash</span>
                <span class="mc-desc">Runner + Phonics battles · Shop · Daily · Achievements</span>
            </div>
        </button>
        <button class="mc-btn flap-btn" onclick="launchFlappyGame()">
            <span class="mc-icon">🦕</span>
            <div class="mc-text">
                <span class="mc-name">Dino Dash</span>
                <span class="mc-desc">Flappy-style endless runner</span>
            </div>
        </button>
    </div>
</div>

<!-- SLASH GAME (main canvas + overlay) -->
<div id="slashScreen" class="screen">
    <div id="slashWrapper">
        <canvas id="slashCanvas"></canvas>
        <div id="rotatePrompt" class="rotate-prompt">
            <div class="rotate-icon">📱➡️🔄</div>
            <div class="rotate-text">Rotate your device for the best experience!</div>
        </div>
        <button id="slashExitBtn" class="slash-exit-btn" onclick="exitSlash()" title="Back to menu">✕</button>
        <button id="slashFsBtn" class="slash-fs-btn game-fs-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
        <div id="runnerControls" class="runner-controls hidden">
            <div class="dpad-move">
                <button class="dpad-btn" id="dpadLeft">◀</button>
                <button class="dpad-btn" id="dpadRight">▶</button>
            </div>
            <button class="dpad-btn dpad-jump" id="dpadJump">▲<br><span>JUMP</span></button>
        </div>
        <div id="battleOverlay" class="battle-overlay"></div>
    </div>
</div>

<!-- DINO DASH (Flappy) -->
<div id="flappyScreen" class="screen">
    <div id="flappyWrapper">
        <canvas id="flappyCanvas"></canvas>
        <button id="muteBtn" class="fd-btn fd-mute flappy-overlay-btn">🔊</button>
        <button id="flappyBackBtn" class="fd-btn fd-back flappy-overlay-btn" onclick="exitFlappy()">✕</button>
        <button id="flappyFsBtn" class="fd-btn fd-fs flappy-overlay-btn game-fs-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
        <div id="skinPicker" class="fd-skin-picker">
            <button id="prevSkin" class="fd-skin-arrow flappy-overlay-btn">◀</button>
            <span id="skinName" class="fd-skin-name">Raptor</span>
            <button id="nextSkin" class="fd-skin-arrow flappy-overlay-btn">▶</button>
        </div>
        <div id="modeButtons" class="fd-mode-row">
            <button id="modeBtnClassic" class="fd-mode-btn fd-active flappy-overlay-btn">🎲 Classic</button>
            <button id="modeBtnDaily" class="fd-mode-btn flappy-overlay-btn">📅 Daily</button>
        </div>
        <button id="shareBtn" class="fd-share-btn flappy-overlay-btn" style="display:none">
            📤 Share Score
        </button>
    </div>
</div>

<!-- ── NEW SCREENS ── -->

<!-- SHOP SCREEN -->
<div id="shopScreen" class="screen">
    <div class="shop-header">
        <h1>🏪 Rice Grain Shop</h1>
        <p class="rice-count">You have: <span id="shopRiceCount">0</span> 🌾</p>
    </div>
    <div class="shop-tabs">
        <button data-tab="swords" class="active">⚔️ Swords</button>
        <button data-tab="hats">🎩 Hats</button>
        <button data-tab="companions">🐾 Companions</button>
        <button data-tab="powerups">💊 Power-Ups</button>
    </div>
    <div id="shopItems" class="shop-grid"></div>
    <button class="back-btn" onclick="goToMenuFromShop()">← Back to Menu</button>
</div>

<!-- ACHIEVEMENTS SCREEN -->
<div id="achievementsScreen" class="screen">
    <div class="ach-header">
        <h1>🥇 Achievements</h1>
        <p><span id="achCount">0</span> / <span id="achTotal">0</span> unlocked</p>
    </div>
    <div id="achGrid" class="ach-grid"></div>
    <button class="back-btn" onclick="goToMenuFromAchievements()">← Back</button>
</div>

<!-- DAILY CHALLENGE SCREEN -->
<div id="dailyScreen" class="screen">
    <div class="daily-header">
        <h1>📅 Daily Challenge</h1>
        <p id="dailyTheme"></p>
    </div>
    <div class="daily-progress">
        <div class="progress-bar"><div id="dailyProgressBar" class="progress-fill"></div></div>
        <p id="dailyProgressText">0 / 0 words</p>
    </div>
    <div id="dailyWordsList" class="daily-words"></div>
    <button id="dailyActionBtn" class="daily-action-btn">Start Daily</button>
    <button class="back-btn" onclick="goToMenuFromDaily()">← Back</button>
</div>

<!-- SCRIPTS -->
<script src="js/phonicsData.js"></script>
<script src="js/progressTracker.js"></script>
<script src="js/audioManager.js"></script>
<script src="js/runnerEngine.js"></script>
<script src="js/battleEngine.js"></script>
<script src="js/slashGame.js"></script>
<script src="js/game.js"></script>
<script>
// ── Fullscreen toggle ──────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

// ── Simple navigation helpers (called from buttons) ─────────────
function goToMenu() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('modeChooser').classList.add('active');
}

function goToMenuFromShop()   { goToMenu(); }
function goToMenuFromAchievements() { goToMenu(); }
function goToMenuFromDaily()  { goToMenu(); }

// ── Prevent unwanted browser behaviors ─────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });
</script>
</body>
</html>
